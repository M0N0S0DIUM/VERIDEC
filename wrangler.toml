# Cloudflare Workers Configuration

name = "veridec"
main = "src/worker.js"
type = "module"
compatibility_date = "2024-01-01"

# Routes for the worker
routes = [
  { pattern = "*veridec.yoursubdomain.workers.dev/*", custom_domain = true },
]

# Environment variables (set these in Cloudflare dashboard or use wrangler secret)
# MCP_SERVER_URL = "http://localhost:3000" # Change this to your actual MCP server URL

[env.production]
name = "veridec-production"

# If you want to use a single worker that serves both the API and static files
[[rules]]
type = "Assets"
glob = "**/*"